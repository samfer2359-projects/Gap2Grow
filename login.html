<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
<div class="page-wrapper">

    <p class="top-message">Welcome back. Let’s keep growing :)</p>

    <div class="login-container">
        <h2>Login</h2>

        <!-- ERROR MESSAGE -->
        <p id="error-msg" style="color:red;text-align:center;"></p>

        <form action="login.php" method="POST" onsubmit="return validateLogin()">

            <label>Email</label>
            <input type="email" name="email" id="email" required>

            <label>Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don’t have an account? <a href="signup.html">Sign up</a></p>
    </div>

</div>

<script>
// Read URL params
const params = new URLSearchParams(window.location.search);

// Show error
if (params.get("error") === "invalid") {
    document.getElementById("error-msg").innerText = "Invalid email or password";
}

// Preserve email
if (params.get("email")) {
    document.getElementById("email").value = params.get("email");
}

// Client validation
function validateLogin() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if (!email || !password) {
        document.getElementById("error-msg").innerText = "All fields are required";
        return false;
    }
    return true;
}
</script>

</body>
</html>
